<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.wrap{position:relative;width:100%;height:100%;overflow:hidden}
iframe{
  position:absolute;
  top:0;left:0;
  /* render at 2.86× the container, scale 0.35 so it fits exactly */
  /* at 0.35 scale: slot_height / 0.35 ≈ 930px content visible,
     which clears the header (390px) + first chart (510px) fully */
  width:286%;
  height:286%;
  transform:scale(0.35);
  transform-origin:top left;
  border:none;
  background:transparent;
}
</style>
</head>
<body>
<div class="wrap">
  <iframe src="../career-ai_cli_logs/report.html" scrolling="no" loading="lazy"></iframe>
</div>
</body>
</html>
