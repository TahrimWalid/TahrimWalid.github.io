<html lang="en">
<head>

<style>
:root {
  --bg:#08080a;
  --bg-elev:#111116;
  --bg-elev-2:#191920;
  --border:#222229;
  --border-strong:#34343d;
  --text:#ededf0;
  --text-dim:#9a9aa4;
  --text-faint:#5f5f6a;
  --accent:#00ff41;
  --accent-soft:rgba(0,255,65,0.10);
  --accent-glow:rgba(0,255,65,0.42);
  --particle:rgba(0,255,65,0.45);
  --on-accent:#08080a;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --fs-display:clamp(2.6rem,7vw,5rem);
  --fs-h1:clamp(2rem,4.6vw,3.2rem);
  --fs-h2:clamp(1.5rem,3vw,2.2rem);
  --fs-h3:clamp(1.2rem,2vw,1.45rem);
  --fs-body:clamp(1rem,1.05vw,1.08rem);
  --space-xs:8px; --space-sm:16px; --space-md:24px;
  --space-lg:40px; --space-xl:64px; --space-2xl:104px;
  --maxw:1180px;
  --nav-h:70px;
  --radius:4px;
  --radius-lg:8px;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --dur-fast:160ms;
  --dur:280ms;
  --dur-slow:520ms;
  --page-dur:620ms;
}

[data-theme="light"] {
  --bg:#f5f5f7;
  --bg-elev:#ffffff;
  --bg-elev-2:#ececef;
  --border:#e3e3e8;
  --border-strong:#cdcdd5;
  --text:#121217;
  --text-dim:#54545e;
  --text-faint:#9b9ba4;
  --accent:#0891b2;
  --accent-soft:rgba(8,145,178,0.10);
  --accent-glow:rgba(8,145,178,0.30);
  --particle:rgba(8,145,178,0.38);
  --on-accent:#ffffff;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-display);font-size:var(--fs-body);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
canvas{display:block}
::selection{background:var(--accent);color:var(--on-accent)}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-glow)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

[data-reveal]{opacity:0;transform:translateY(26px);will-change:transform,opacity}
[data-reveal].is-visible{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){[data-reveal]{opacity:1!important;transform:none!important}*{scroll-behavior:auto}}

[data-page]{transition:opacity var(--page-dur) var(--ease),transform var(--page-dur) var(--ease)}

nav a[data-active]{color:var(--accent)!important}

.nav-link{position:relative;font-family:var(--font-mono);font-size:0.8rem;color:var(--text-dim);transition:color var(--dur) var(--ease)}
.nav-link:hover{color:var(--text)}

.nav-btn{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:7px 11px;cursor:pointer;transition:border-color var(--dur),color var(--dur)}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}

.btn-primary{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:0.82rem;background:var(--accent);color:var(--on-accent);padding:13px 22px;border-radius:var(--radius);transition:transform var(--dur) var(--ease),filter var(--dur)}
.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.12)}

.btn-secondary{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:0.82rem;color:var(--text);border:1px solid var(--border-strong);padding:13px 22px;border-radius:var(--radius);transition:border-color var(--dur),transform var(--dur) var(--ease)}
.btn-secondary:hover{border-color:var(--accent);transform:translateY(-2px)}

.card-link{position:relative;display:flex;flex-direction:column;gap:15px;padding:26px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color var(--dur) var(--ease),translate var(--dur) var(--ease),scale var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.card-link:hover{border-color:var(--accent);translate:0 -8px;scale:1.02;box-shadow:0 22px 60px -22px var(--accent-glow)}

.project-row{display:grid;grid-template-columns:auto 1fr auto;gap:clamp(18px,4vw,48px);align-items:start;padding:clamp(24px,3vw,36px);background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);transition:border-color var(--dur) var(--ease),translate var(--dur) var(--ease),scale var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.project-row:hover{border-color:var(--accent);translate:0 -8px;scale:1.02;box-shadow:0 22px 60px -22px var(--accent-glow)}

.skill-card{padding:24px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);transition:border-color var(--dur)}
.skill-card:hover{border-color:var(--border-strong)}

.contact-card{display:flex;flex-direction:column;gap:14px;padding:30px;background:var(--bg-elev);transition:background var(--dur)}
.contact-card:hover{background:var(--bg-elev-2)}

.ext-link{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:0.78rem;padding:11px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);transition:border-color var(--dur)}
.ext-link:hover{border-color:var(--accent)}

.next-link{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:var(--space-2xl);padding:26px clamp(20px,3vw,32px);background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);transition:border-color var(--dur),transform var(--dur) var(--ease)}
.next-link:hover{border-color:var(--accent);transform:translateY(-3px)}

.back-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.78rem;color:var(--text-dim);margin-bottom:var(--space-lg);transition:color var(--dur)}
.back-link:hover{color:var(--accent)}

.dim-link{color:var(--text-dim);transition:color var(--dur)}
.dim-link:hover{color:var(--accent)}

.footer-link{color:var(--text-dim);transition:color var(--dur)}
.footer-link:hover{color:var(--accent)}

@media(max-width:840px){
  .two-col{grid-template-columns:1fr!important}
}
@media(max-width:680px){
  .nav-links{gap:14px!important}
  .nav-logo-sub{display:none}
}
@media(max-width:520px){
  .nav-links a[data-route]{font-size:0.72rem}
}
</style>

      <a href="https://github.com/TahrimWalid" target="_blank" rel="noopener" class="footer-link">github</a>

</footer>

</div>
<script>
const SKILLS = [
  { cat: 'Frontend',        items: ['React','React Native','Next.js','ReactFlow','Monaco'] },
  { cat: 'Backend',         items: ['Python','REST APIs','Web Scraping','API inspection (DevTools)'] },
  { cat: 'AI & Edge',       items: ['LLMs (Llama.cpp, Qwen 2.5–27B, vLLM)','4-bit quantization','ARM & GPU deployment'] },
  { cat: 'Data',            items: ['SQLite','SQL','ETL pipelines','NLP parsing'] },
  { cat: 'Security',        items: ['NDR','Log analysis','Nmap','adversarial benchmarking'] },
  { cat: 'Infrastructure',  items: ['Linux','Apache','Cloudflare','SSH','systemd','Git','Terraform','Vercel','CI/CD'] },
];

const PROJECTS = [
  {
    id: 'oppipolku',
    name: 'Oppipolku',
    tagline: '€5,000 Funded',
    subtitle: 'Course Benchmarking Platform',
    tag: '€5,000 Funded',
    stat: { value: '40+', label: 'API endpoints' },
    oneliner: "A team-built course benchmarking platform for Finnish universities — funded by the TAMK Foundation, deployed on real infrastructure, targeting universities as B2B clients.",
    stack: ['Python','REST APIs','40+ endpoint Benchmarking API','Linux','Cloudflare Tunnel','Apache','systemd','Ubuntu'],
    links: [],
    note: 'Repo private — code available on request.',
    description: [
      "Oppipolku is a course benchmarking platform for Finnish universities, awarded €5,000 by the TAMK Foundation. My contribution was building a comprehensive benchmarking API — 40+ endpoints across 9 functional categories — designed so the LLM reasons from live structured data rather than general knowledge.",
      "The API covers: global market benchmarks (price, ECTS, language distributions), per-organization snapshots and side-by-side comparisons, rankings by metric (course count, English percentage, online delivery rate), market gap analysis identifying where an organization trails the national average by study field and language, trend analysis per organization, and full-text course search with combined metadata filtering. Pricing endpoints include per-credit breakdowns, free course ratios, and histogram data.",
      "The backend runs as a systemd daemon behind a Cloudflare Tunnel and Apache reverse proxy on a remote Ubuntu server. The design philosophy was retrieval-first — every benchmark claim the LLM makes is traceable to a live API response, not hallucinated context.",
    ],
    stages: [
      'API reverse-engineering demo (DevTools → endpoint discovery)',
      'Market gap analysis endpoint returning org vs national average',
      'Side-by-side org comparison endpoint response',
      'LLM benchmarking output grounded in live API data',
    ],
  },
  {
    id: 'kratos',
    name: 'Kratos',
    tagline: "Bachelor's Thesis",
    subtitle: 'Offline AI Security Analysis System',
    tag: "Bachelor's Thesis",
    stat: { value: '7B', label: 'params · air-gapped' },
    oneliner: "A fully offline, five-stage security pipeline running a 7B code model on ARM hardware — built for air-gapped environments where cloud APIs aren't an option.",
    stack: ['Python','Qwen2.5-Coder 7B','Llama.cpp','ARM','Linux','CSC OpenStack'],
    links: [{ label: 'GitHub', url: 'github.com/TahrimWalid/kratos' }],
    description: [
      "The pipeline runs five stages in sequence — scan → log parsing → system context → correlation → LLM analysis. The correlation engine implements 10 rules including sliding-window SSH burst detection and baseline drift detection across sudo membership, services, and open ports. Every alert is severity-ranked and traceable to its specific source evidence.",
      "The model is Qwen2.5-Coder 7B (Q4_K_M, ~4.5 GB) running via Llama.cpp on a Mixtile Blade 3 (16 GB RAM) and a CSC OpenStack VM. A daemon mode keeps the model loaded in RAM between queries, bringing repeated query latency from ~2 minutes down to 10–20 seconds.",
      "Output follows a structured Observation → Evidence → Risk → Action format — the LLM is forced to cite specific log values rather than producing generic advice. Deterministic and reproducible by design.",
    ],
    stages: [
      'Daemon startup / model loading into RAM',
      'Pipeline running all five stages',
      'Correlation engine catching an SSH burst',
      'Structured LLM output (Observation → Evidence → Risk → Action)',
    ],
    stageDemos: [
      'demos/kratos-daemon.html',
      'demos/kratos-pipeline.html',
      'demos/kratos-sshburst.html',
      'demos/kratos-llm-output.html',
    ],
  },
  {
    id: 'ingen',
    name: 'InGen',
    tagline: 'Full-Stack · Self-hosted AI',
    subtitle: 'AI-Powered AWS Infrastructure Compiler',
    tag: '',
    stat: { value: '27B', label: 'self-hosted model' },
    oneliner: "A visual AWS architecture designer that validates against 32 rules, compiles to Terraform HCL, and syncs bidirectionally in real time — with a self-hosted 27B model doing the AI layer.",
    stack: ['Next.js','React','ReactFlow','Terraform','Qwen3-27B-FP8','vLLM','RTX 6000 Ada','Vercel'],
    links: [
      { label: 'Live',   url: 'in-gen-five.vercel.app' },

    ],

    ],
    stages: [
      'Dragging/connecting AWS components',
      'Validation engine catching misconfiguration',
      'Terraform HCL compiling in Monaco',
      'Bidirectional sync demo',
      'AI suggestion generating',
    ],
  },
  {
    id: 'career-ai',
    name: 'Career AI',
    tagline: 'Data Engineering',
    subtitle: 'Finnish IT Job Market Analysis Pipeline',
    tag: '',
    stat: { value: '1,998', label: 'jobs analyzed' },
    oneliner: "A 5-phase ETL pipeline that scraped ~2,000 Finnish IT job postings, hit 96.7% hydration and 100% LLM extraction success, and uncovered a fundamental bias problem in its own metrics along the way.",
    stack: ['Python','SQLite','Ollama','Qwen 2.5 3B','Pydantic','Chart.js'],
    links: [{ label: 'GitHub', url: 'github.com/TahrimWalid/career-ai' }],
    description: [
      "Career AI is a five-phase ETL pipeline for the Finnish IT job market. After discovering the underlying job-board API through DevTools inspection, it scraped roughly 2,000 postings, reaching 96.7% hydration and 100% LLM extraction success across the dataset.",
      "Request throttling is handled by an adaptive backoff strategy that eases off when the source pushes back and accelerates when it doesn't. A local Qwen 2.5 3B model running via Ollama parses each posting into structured fields validated with Pydantic.",
      "The most interesting finding was methodological: a single bias metric swung from 5% to 82.5% to 4.5% depending on how it was computed — a reminder that the measurement can manufacture the result. Output ships as an interactive HTML report with Chart.js visualizations.",
    ],
    stages: [
      'Pipeline running all 5 phases',
      'Adaptive backoff triggering',
      'Bias metric swing visualization (5% → 82.5% → 4.5%)',
      'Interactive HTML report output',
    ],
    stageDemos: [
      'demos/career-ai-pipeline.html',
      'demos/career-ai-backoff.html',
      'demos/career-ai-bias.html',
      'demos/career-ai-report.html',
    ],
  },
];

// ── State ──────────────────────────────────────────────────────────────────
const state = { route: 'home', projectId: null, theme: 'dark' };

// ── Particles ──────────────────────────────────────────────────────────────
let pRaf = null, pCanvas = null, pCtx = null, pParts = [];
let pW = 0, pH = 0, pDpr = 1;
let pColor = 'rgba(0,255,65,0.45)', pAccent = '#00ff41';
const mouse = { x: -9999, y: -9999 };
let preResizeFn = null, pMoveFn = null, pLeaveFn = null;

function refreshParticleColor() {
  try {
    const cs = getComputedStyle(document.getElementById('app') || document.body);
    pColor = cs.getPropertyValue('--particle').trim();
    pAccent = cs.getPropertyValue('--accent').trim();
  } catch (e) {}
}

function stopParticles() {
  if (pRaf) { cancelAnimationFrame(pRaf); pRaf = null; }
  if (preResizeFn) { window.removeEventListener('resize', preResizeFn); preResizeFn = null; }
  if (pMoveFn)  { window.removeEventListener('mousemove', pMoveFn); pMoveFn = null; }
  if (pLeaveFn) { window.removeEventListener('mouseout', pLeaveFn); pLeaveFn = null; }
  pCanvas = null;
}

function setupParticles() {
  const canvas = document.getElementById('hero-particles');
  if (state.route !== 'home' || !canvas) { stopParticles(); return; }
  if (pCanvas === canvas) return;
  pCanvas = canvas;
  pCtx = canvas.getContext('2d');
  refreshParticleColor();

  const resize = () => {
    const rect = canvas.getBoundingClientRect();
    pDpr = Math.min(window.devicePixelRatio || 1, 2);
    pW = rect.width; pH = rect.height;
    canvas.width = pW * pDpr; canvas.height = pH * pDpr;
    pCtx.setTransform(pDpr, 0, 0, pDpr, 0, 0);
    const count = Math.max(34, Math.min(115, Math.floor(pW * pH / 9500)));
    pParts = Array.from({ length: count }, () => ({
      x: Math.random() * pW, y: Math.random() * pH,
      vx: (Math.random() - 0.5) * 0.32, vy: (Math.random() - 0.5) * 0.32,
    }));
  };
  resize();
  if (preResizeFn) window.removeEventListener('resize', preResizeFn);
  preResizeFn = resize;
  window.addEventListener('resize', resize);

  if (pMoveFn) window.removeEventListener('mousemove', pMoveFn);
  if (pLeaveFn) window.removeEventListener('mouseout', pLeaveFn);
  pMoveFn = e => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; };
  pLeaveFn = () => { mouse.x = -9999; mouse.y = -9999; };
  window.addEventListener('mousemove', pMoveFn);
  window.addEventListener('mouseout', pLeaveFn);

  const draw = () => {
    if (pCanvas !== canvas) return;
    pCtx.clearRect(0, 0, pW, pH);
    const col = pColor || 'rgba(0,255,65,0.45)';
    const acc = pAccent || '#00ff41';
    for (let i = 0; i < pParts.length; i++) {
      const p = pParts[i];
      const dx = p.x - mouse.x, dy = p.y - mouse.y, d2 = dx * dx + dy * dy;
      if (d2 < 16000) { const d = Math.sqrt(d2) || 1; const f = (130 - d) / 130; p.vx += dx / d * f * 0.25; p.vy += dy / d * f * 0.25; }
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.985; p.vy *= 0.985;
      if (Math.abs(p.vx) < 0.05) p.vx += (Math.random() - 0.5) * 0.05;
      if (Math.abs(p.vy) < 0.05) p.vy += (Math.random() - 0.5) * 0.05;
      if (p.x < 0 || p.x > pW) p.vx *= -1;
      if (p.y < 0 || p.y > pH) p.vy *= -1;
      p.x = Math.max(0, Math.min(pW, p.x)); p.y = Math.max(0, Math.min(pH, p.y));
      pCtx.beginPath(); pCtx.arc(p.x, p.y, 1.5, 0, 7); pCtx.fillStyle = col; pCtx.fill();
    }
    for (let i = 0; i < pParts.length; i++) {
      for (let j = i + 1; j < pParts.length; j++) {
        const a = pParts[i], b = pParts[j];
        const dx = a.x - b.x, dy = a.y - b.y, dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 118) {
          pCtx.globalAlpha = (1 - dist / 118) * 0.5;
          pCtx.strokeStyle = col; pCtx.lineWidth = 0.6;
          pCtx.beginPath(); pCtx.moveTo(a.x, a.y); pCtx.lineTo(b.x, b.y); pCtx.stroke();
        }
      }
    }
    if (mouse.x > -9000) {
      for (let i = 0; i < pParts.length; i++) {
        const a = pParts[i];
        const dx = a.x - mouse.x, dy = a.y - mouse.y, dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 165) {
          pCtx.globalAlpha = (1 - dist / 165) * 0.75;
          pCtx.strokeStyle = acc; pCtx.lineWidth = 0.8;
          pCtx.beginPath(); pCtx.moveTo(a.x, a.y); pCtx.lineTo(mouse.x, mouse.y); pCtx.stroke();
        }
      }
    }
    pCtx.globalAlpha = 1;
    pRaf = requestAnimationFrame(draw);
  };
  pRaf = requestAnimationFrame(draw);
}

// ── Scroll reveal ──────────────────────────────────────────────────────────
function tweenReveal(el, delay) {
  if (el._tweening) return;
  el._tweening = true;
  const dur = 620, dist = 26;
  const begin = performance.now() + delay;
  const ease = t => 1 - Math.pow(1 - t, 3);
  const step = now => {
    const t = Math.min(1, Math.max(0, (now - begin) / dur));
    const e = ease(t);
    el.style.opacity = String(e);
    el.style.transform = `translateY(${dist * (1 - e)}px)`;
    if (t < 1) requestAnimationFrame(step);
    else { el.style.opacity = ''; el.style.transform = ''; el.style.willChange = 'auto'; }
  };
  requestAnimationFrame(step);
}

function observeReveals() {
  const vh = window.innerHeight || 800;
  let i = 0;
  document.querySelectorAll('[data-reveal]:not(.is-visible)').forEach(el => {
    if (el.getBoundingClientRect().top < vh * 0.92) {
      el.classList.add('is-visible');
      tweenReveal(el, Math.min(i++ * 100, 600));
    }
  });
}

function revealAll() {
  let i = 0;
  document.querySelectorAll('[data-reveal]:not(.is-visible)').forEach(el => {
    el.classList.add('is-visible');
    tweenReveal(el, Math.min(i++ * 90, 500));
  });
}

function enterPages() {
  document.querySelectorAll('[data-page]:not([data-entered])').forEach(el => {
    el.setAttribute('data-entered', '');
    el.style.transform = 'translateY(12px)';
    requestAnimationFrame(() => requestAnimationFrame(() => { el.style.transform = 'none'; }));
  });
}

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(t) {
  const app = document.getElementById('app');
  if (app) app.setAttribute('data-theme', t);
  document.body.setAttribute('data-theme', t);
  const lbl = document.getElementById('theme-label');
  if (lbl) lbl.textContent = t;
}

function toggleTheme() {
  const t = state.theme === 'dark' ? 'light' : 'dark';
  state.theme = t;
  applyTheme(t);
  try { localStorage.setItem('wt-theme', t); } catch (e) {}
  refreshParticleColor();
}

// ── Nav ────────────────────────────────────────────────────────────────────
function updateNav() {
  const map = { home:'home', about:'about', projects:'projects', project:'projects', contact:'contact' };
  const active = map[state.route];
  document.querySelectorAll('[data-route]').forEach(a => {
    const on = a.getAttribute('data-route') === active;
    if (on) a.setAttribute('data-active', ''); else a.removeAttribute('data-active');
    const bar = a.querySelector('[data-bar]');
    if (bar) bar.style.opacity = on ? '1' : '0';
  });
  const lbl = document.getElementById('theme-label');
  if (lbl) lbl.textContent = state.theme;
}

// ── Router ─────────────────────────────────────────────────────────────────
function onHash() {
  const raw = (location.hash || '').replace(/^#\/?/, '');
  const parts = raw.split('/').filter(Boolean);
  let route = 'home', projectId = null;
  if (parts[0] === 'about') route = 'about';
  else if (parts[0] === 'projects') {
    if (parts[1]) { route = 'project'; projectId = parts[1]; }
    else route = 'projects';
  } else if (parts[0] === 'contact') route = 'contact';
  if (route === 'project' && !PROJECTS.find(p => p.id === projectId)) {
    route = 'projects'; projectId = null;
  }
  state.route = route;
  state.projectId = projectId;
  window.scrollTo({ top: 0, left: 0 });
  render();
}

function renderProjectDetail() {

      <h1 style="margin:0;font-size:var(--fs-h1);font-weight:600;letter-spacing:-0.03em">${p.name}</h1>
      ${p.tag ? `<span style="font-family:var(--font-mono);font-size:0.72rem;font-weight:700;background:var(--accent);color:var(--on-accent);border-radius:99px;padding:5px 12px;white-space:nowrap;letter-spacing:0.02em">${p.tag}</span>` : ''}

    <p style="margin:0 0 var(--space-md);font-family:var(--font-mono);font-size:0.9rem;color:var(--text-dim)">${p.subtitle}</p>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:var(--space-lg)">
      ${p.stack.map(t => techPill(t, 'var(--bg-elev)', '0.72rem', '5px 11px')).join('')}

    <div style="max-width:72ch;margin:0 0 var(--space-lg)">
      ${p.description.map(para => `<p style="margin:0 0 var(--space-md);color:var(--text-dim);font-size:1.04rem;line-height:1.8">${para}</p>`).join('')}
    </div>

    ${linkBtns ? `<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:var(--space-lg)">${linkBtns}</div>` : ''}
    ${noteHtml}

    <h2 data-reveal style="margin:0 0 var(--space-lg);font-size:var(--fs-h2);font-weight:600;letter-spacing:-0.03em"><span style="font-family:var(--font-mono);font-size:0.7em;color:var(--accent);margin-right:10px">//</span>Walkthrough</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:var(--space-md)">
      ${stages}
    </div>

    <a href="#/projects/${next.id}" class="next-link">
      <span style="font-family:var(--font-mono);font-size:0.74rem;color:var(--text-faint)">next project</span>
      <span style="display:flex;align-items:center;gap:12px;font-size:1.2rem;font-weight:600;letter-spacing:-0.02em">${next.name} <span style="color:var(--accent)">→</span></span>
    </a>
  </section>`;
}

// ── Main render ────────────────────────────────────────────────────────────
let revealAllTimer = null;

function typeText(id, text, delay) {
  const el = document.getElementById(id);
  if (!el) return;
  let i = 0;
  el.textContent = '';
  const interval = setInterval(() => {
    el.textContent = text.slice(0, ++i);
    if (i >= text.length) clearInterval(interval);
  }, delay || 32);
}

function typeContactTagline() {
  typeText('contact-tagline', 'I would love to work with cloud architecture, DevOps and low level LLM deployment at scale', 28);
}

function startRoleRotation() {
  const el = document.getElementById('home-role');
  if (!el) return;
  const roles = [
    'Full-Stack Software Engineer',
    'Aspiring Cloud & Network Infrastructure Engineer',
  ];
  let roleIdx = 0;
  function typeRole() {
    const text = roles[roleIdx];
    let i = 0;
    el.textContent = '';
    const typing = setInterval(() => {
      if (!document.getElementById('home-role')) { clearInterval(typing); return; }
      el.textContent = text.slice(0, ++i);
      if (i >= text.length) {
        clearInterval(typing);
        setTimeout(deleteRole, 1800);
      }
    }, 52);
  }
  function deleteRole() {
    const text = el.textContent;
    let i = text.length;
    const deleting = setInterval(() => {
      if (!document.getElementById('home-role')) { clearInterval(deleting); return; }
      el.textContent = text.slice(0, --i);
      if (i <= 0) {
        clearInterval(deleting);
        roleIdx = (roleIdx + 1) % roles.length;
        setTimeout(typeRole, 350);
      }
    }, 22);
  }
  typeRole();
}

function render() {
  const main = document.getElementById('main');
  const map = { home: renderHome, about: renderAbout, projects: renderProjects, project: renderProjectDetail, contact: renderContact };
  main.innerHTML = (map[state.route] || renderHome)();
  updateNav();
  enterPages();
  setupParticles();
  observeReveals();
  setTimeout(() => { enterPages(); observeReveals(); }, 80);
  setTimeout(() => observeReveals(), 360);
  clearTimeout(revealAllTimer);
  revealAllTimer = setTimeout(revealAll, 1400);
  if (state.route === 'contact') setTimeout(typeContactTagline, 300);
  if (state.route === 'home') setTimeout(startRoleRotation, 400);
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  let t = 'dark';
  try { t = localStorage.getItem('wt-theme') || 'dark'; } catch (e) {}
  state.theme = t;
  applyTheme(t);

  document.getElementById('theme-btn').addEventListener('click', toggleTheme);

  let scrollTick = false;
  const onScroll = () => {
    if (scrollTick) return;
    scrollTick = true;
    requestAnimationFrame(() => { scrollTick = false; observeReveals(); });
  };
  window.addEventListener('scroll', onScroll, { passive: true, capture: true });
  window.addEventListener('resize', onScroll);

  window.addEventListener('hashchange', onHash);
  onHash();
});
</script>
